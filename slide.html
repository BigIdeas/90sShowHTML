<!DOCTYPE html>
<html>
<head>
  <title>Slide</title>
  <link rel="stylesheet" href="style.css">
  <meta http-equiv="ScreenOrientation" content="autoRotate:disabled">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
  <div class="song-title">Slide</div>
  <div class="toggle-container">
    Capo:
    <span id="toggle-button" class="toggle-button">ON</span>
  </div>
  <h1 id="intro-title"></h1>
  <pre id="intro"></pre>

  <h1 id="verse-title"></h1>
  <pre id="verse"></pre>

  <h1 id="outro-title"></h1>
  <pre id="outro"></pre>

  <script>
    const tabs = {
      capoOn: {
        intro: `
---------------
---------------
-4--4--4h6-4h6-
---------------`,
        verse: `
------------  ---------- (after
------------  ----------  "let it
-44--44--66-  ----66-44-  slide" &
---44--44---  -11-------  "beautiful" 2x)

----------
----------
-44334466-
---------- (what u feel is what u)`,
        outro: `
(1-4-2-2-1) (1-4-2-2)
-10-------------10----------
----13-11----------13-11----
----------11-10----------11-
----------------------------`,
        introTitle: "Intro IV",
        verseTitle: "Verse IV (C#-G#-Eb)",
        outroTitle: "Outro X"
      },
      capoOff: {
        intro: `
---------------
---------------
-3--3--3h5-3h5-
---------------`,
        verse: `
------------  ---------- (after
------------  ----------  "let it
-33--33--55-  ----55-33-  slide" &
---33--33---  -00-------  "beautiful" 2x)

----------
----------
-33223355-
---------- (what u feel is what u)`,
        outro: `
(1-4-2-2-1) (1-4-2-2)
--9--------------9----------
----12-10----------12-10----
----------10--9----------10-
----------------------------`,
        introTitle: "Intro III",
        verseTitle: "Verse III (C-G-D)",
        outroTitle: "Outro IX"
      }
    };

    // Set initial tab content
    const initialTabs = tabs.capoOn;
    document.getElementById('intro').textContent = initialTabs.intro.trim() + '\n\n';
    document.getElementById('verse').textContent = initialTabs.verse.trim() + '\n\n';
    document.getElementById('outro').textContent = initialTabs.outro.trim() + '\n\n';
    document.getElementById('intro-title').textContent = initialTabs.introTitle.trim() + '\n\n';
    document.getElementById('verse-title').textContent = initialTabs.verseTitle.trim() + '\n\n';
    document.getElementById('outro-title').textContent = initialTabs.outroTitle.trim() + '\n\n';

    document.getElementById('toggle-button').addEventListener('click', function() {
      var isCapoOn = this.textContent === 'ON';
      this.textContent = isCapoOn ? 'OFF' : 'ON';
      const selectedTabs = isCapoOn ? tabs.capoOff : tabs.capoOn;

      // Update each section's tab and titles based on capo status
      document.getElementById('intro').textContent = selectedTabs.intro.trim() + '\n\n';
      document.getElementById('verse').textContent = selectedTabs.verse.trim() + '\n\n';
      document.getElementById('outro').textContent = selectedTabs.outro.trim() + '\n\n';

      // Update the titles
      document.getElementById('intro-title').textContent = selectedTabs.introTitle.trim() + '\n\n';
      document.getElementById('verse-title').textContent = selectedTabs.verseTitle.trim() + '\n\n';
      document.getElementById('outro-title').textContent = selectedTabs.outroTitle.trim() + '\n\n';
    });

    // Swipe to go back handler
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    });

    document.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    });

    function handleSwipe() {
      if (touchEndX - touchStartX > 100) {
        window.history.back();
      }
    }
  </script>
</body>
</html>
