<!DOCTYPE html>
<html>
<head>
  <title>Mr Brightside</title>
  <link rel="stylesheet" href="style.css">
  <meta http-equiv="ScreenOrientation" content="autoRotate:disabled">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
  <div class="song-title">Mr brightside</div>
  <div class="toggle-container" style="top: 60px">
    Half step up:
    <span id="toggle-button" class="toggle-button">ON</span>
  </div>
  <br/>
  <br/>
  <h1 id="verse-title"></h1>
  <pre id="verse"></pre>

  <h1 id="prechorus-title"></h1>
  <pre id="prechorus" style="font-size: 26px;"></pre>
  
  <h1 id="chorus-title"></h1>
  <pre id="chorus" style="font-size: 27px;"></pre>

  <h1 id="bridge-title"></h1>
  <pre id="bridge"></pre>

  <h1 id="ending-title"></h1>
  <pre id="ending"></pre>

  <script>
    const tabs = {
      halfStepUp: {
        verse: `
  (in after "it all")
A -5555-4444------  -5555-4444-/10-
E -----------3333-  ---------------`,
        prechorus: `
A -----97---------97----------7---------------
E -7777--10---5555--10---3333--10-9--33-79-10-

A -----------  -----------
E -233332333-  -/15-15-15-`,
        chorus: `
D ---------------------  -9999-7777- (repeat
A ------1010-----------  -----------  1st
E -1010------7777-5555-  -----------  part)`,
        bridge: `
-11--7---4---6---11--7---4-------
--------------------------------- 
-9---5---2---4---9---5---2------- (to
----------------------------5555-  chorus)`,
        ending: `
D -9999-7---
A -------7--
E --------3-`,
        verseTitle: "Verse III (D-C#-G)",
        prechorusTitle: "Prechorus VII (B-A-G)",
        chorusTitle: "Chorus VII (D-G-B-A)",
        bridgeTitle: "Bridge IX (F#-D-B-C#)",
        endingTitle: "Ending"
      },
      standardTuning: {
        verse: `
  (in after "it all")
A -4444-3333------  -4444-3333-/9999-
E -----------2222-  -----------------`,
        prechorus: `
A -----86---------86----------6---------------
E -6666--9----4444--9----2222--98----2222-689-

A -----------  -----------
E -122221222-  -/14-14-14-`,
        chorus: `
D ---------------------  -8888-6666- (repeat
A ------9999-----------  -----------  1st
E -9999------6666-4444-  -----------  part)`,
        bridge: `
-10--6---3---5---10--6---3-------
--------------------------------- 
-8---4---1---3---8---4---1------- (to
----------------------------4444-  chorus)`,
        ending: `
D -8888-6---
A -------6--
E --------4-`,
        verseTitle: "Verse II (C#-C-F#)",
        prechorusTitle: "Prechorus VI (Bb-G#-F#)",
        chorusTitle: "Chorus VI (C#-F#-Bb-G#)",
        bridgeTitle: "Bridge VIII (F-C#-Bb-C)",
        endingTitle: "Ending"
      }
    };

    // Set initial tab content
    const initialTabs = tabs.halfStepUp;
    document.getElementById('verse').textContent = initialTabs.verse.trim() + '\n\n';
    document.getElementById('prechorus').textContent = initialTabs.prechorus.trim() + '\n\n';
    document.getElementById('chorus').textContent = initialTabs.chorus.trim() + '\n\n';
    document.getElementById('bridge').textContent = initialTabs.bridge.trim() + '\n\n';
    document.getElementById('ending').textContent = initialTabs.ending.trim() + '\n\n';
    document.getElementById('verse-title').textContent = initialTabs.verseTitle.trim() + '\n\n';
    document.getElementById('prechorus-title').textContent = initialTabs.prechorusTitle.trim() + '\n\n';
    document.getElementById('chorus-title').textContent = initialTabs.chorusTitle.trim() + '\n\n';
    document.getElementById('bridge-title').textContent = initialTabs.bridgeTitle.trim() + '\n\n';
    document.getElementById('ending-title').textContent = initialTabs.endingTitle.trim() + '\n\n';

    document.getElementById('toggle-button').addEventListener('click', function() {
      var isHalfStepUp = this.textContent === 'ON';
      this.textContent = isHalfStepUp ? 'OFF' : 'ON';
      const selectedTabs = isHalfStepUp ? tabs.standardTuning : tabs.halfStepUp;

      // Update each section's tab and titles based on capo status
      document.getElementById('verse').textContent = selectedTabs.verse.trim() + '\n\n';
      document.getElementById('prechorus').textContent = selectedTabs.prechorus.trim() + '\n\n';
      document.getElementById('chorus').textContent = selectedTabs.chorus.trim() + '\n\n';
      document.getElementById('bridge').textContent = selectedTabs.bridge.trim() + '\n\n';
      document.getElementById('ending').textContent = selectedTabs.ending.trim() + '\n\n';

      // Update the titles
      document.getElementById('verse-title').textContent = selectedTabs.verseTitle.trim() + '\n\n';
      document.getElementById('prechorus-title').textContent = selectedTabs.prechorusTitle.trim() + '\n\n';
      document.getElementById('chorus-title').textContent = selectedTabs.chorusTitle.trim() + '\n\n';
      document.getElementById('bridge-title').textContent = selectedTabs.bridgeTitle.trim() + '\n\n';
      document.getElementById('ending-title').textContent = selectedTabs.endingTitle.trim() + '\n\n';
    });
  </script>
</body>
</html>
