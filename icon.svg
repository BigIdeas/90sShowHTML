<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff2d95"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 90s Memphis-style zigzag lines -->
  <polyline points="50,390 110,340 170,390 230,340 290,390 350,340 410,390 462,348"
            stroke="#ffd700" stroke-width="9" fill="none" opacity="0.55"
            stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="50,422 110,372 170,422 230,372 290,422 350,372 410,422 462,380"
            stroke="#ff2d95" stroke-width="7" fill="none" opacity="0.35"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Memphis decorative shapes -->
  <circle cx="415" cy="115" r="16" fill="#ffd700" opacity="0.5"/>
  <circle cx="390" cy="155" r="8" fill="#00e5ff" opacity="0.35"/>
  <polygon points="95,130 112,96 129,130" fill="#00e5ff" opacity="0.45"/>
  <rect x="375" y="195" width="22" height="22" fill="#ff2d95" opacity="0.35"
        transform="rotate(45 386 206)"/>

  <!-- Music note - bold eighth note -->
  <!-- Note head -->
  <ellipse cx="210" cy="290" rx="68" ry="50" fill="url(#note)"
           transform="rotate(-20 210 290)"/>
  <!-- Stem -->
  <rect x="264" y="95" width="18" height="205" fill="url(#note)" rx="9"/>
  <!-- Flag -->
  <path d="M 273 95 C 330 105, 355 155, 318 200"
        stroke="url(#note)" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- "90s" text at bottom -->
  <text x="256" y="478" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-weight="900"
        font-size="56" fill="#ffd700" opacity="0.7" letter-spacing="10">90s</text>
</svg>
