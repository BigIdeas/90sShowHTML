<!--
title: What's up
included: true
-->

<div class="toggle-container">
    Full step<br/>down:
    <span id="toggle-button" class="toggle-button">ON</span>
  </div>
  <h1 id="verse-title">Verse II (A-B-D-A)</h1>
  <pre id="verse"></pre>

  <h1 id="pre-chorus-title">Pre chorus (A-B-D-A)</h1>
  <pre id="pre-chorus"></pre>

  <h1 id="chorus-title">Chorus (A-B-D-A)</h1>
  <pre id="chorus"></pre>

  <h1 id="omg-title"></h1>
  <pre id="omg"></pre>

  <script>
    const tabs = {
      standardKey: {
        verse: `
A -12\\-  -----32--235--3------
E -----  -5--3----------5--02-`,
        verseTitle: "Verse II (A-B-D-A)",
        preChorus: `
A ---75-----5--------
E -5-----7-----(03)5-`,
        preChorusTitle: "Pre chorus V (A-B-D-A)",
        chorus: `
A -----5---
E -5-7---5-`,
        chorusTitle: "Chorus V (A-B-D-A)",
        omg: `
---------  -------
-777-5---  -97----
------7--  ---975-
-------7-  -------`,
        omgTitle: "OMG VII"
      },
      fullStepDown: {
        verse: `
A -10\\-  -----10--013--1-----
E -----  -3--1----------3--0-`,
        verseTitle: "Verse 0 (G-A-C-G)",
        preChorus: `
A ---53-----3-------
E -3-----5-----(1)3-`,
        preChorusTitle: "Pre chorus III (G-A-C-G)",
        chorus: `
A -----3---
E -3-5---3-`,
        chorusTitle: "Chorus III (G-A-C-G)",
        omg: `
---------  -------
-555-3---  -75----
------5--  ---753-
-------5-  -------`,
        omgTitle: "OMG V"
      }
    };

    // Set initial tab content
    const initialTabs = tabs.fullStepDown;
    document.getElementById('verse').textContent = initialTabs.verse.trim() + '\n\n';
    document.getElementById('pre-chorus').textContent = initialTabs.preChorus.trim() + '\n\n';
    document.getElementById('chorus').textContent = initialTabs.chorus.trim() + '\n\n';
    document.getElementById('omg').textContent = initialTabs.omg.trim() + '\n\n';
    document.getElementById('verse-title').textContent = initialTabs.verseTitle.trim() + '\n\n';
    document.getElementById('pre-chorus-title').textContent = initialTabs.preChorusTitle.trim() + '\n\n';
    document.getElementById('chorus-title').textContent = initialTabs.chorusTitle.trim() + '\n\n';
    document.getElementById('omg-title').textContent = initialTabs.omgTitle.trim() + '\n\n';

    document.getElementById('toggle-button').addEventListener('click', function() {
      var isStandardKey = this.textContent === 'ON';
      this.textContent = isStandardKey ? 'OFF' : 'ON';
      const selectedTabs = isStandardKey ? tabs.standardKey : tabs.fullStepDown;

      // Update each section's tab and titles
    document.getElementById('verse').textContent = selectedTabs.verse.trim() + '\n\n';
    document.getElementById('pre-chorus').textContent = selectedTabs.preChorus.trim() + '\n\n';
    document.getElementById('chorus').textContent = selectedTabs.chorus.trim() + '\n\n';
    document.getElementById('omg').textContent = selectedTabs.omg.trim() + '\n\n';
    document.getElementById('verse-title').textContent = selectedTabs.verseTitle.trim() + '\n\n';
    document.getElementById('pre-chorus-title').textContent = selectedTabs.preChorusTitle.trim() + '\n\n';
    document.getElementById('chorus-title').textContent = selectedTabs.chorusTitle.trim() + '\n\n';
    document.getElementById('omg-title').textContent = selectedTabs.omgTitle.trim() + '\n\n';
    });
  </script>
