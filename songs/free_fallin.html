<!--
title: Free fallin
included: true
-->

<div class="toggle-container" style="top: 60px">
    Half step down:
    <span id="toggle-button" class="toggle-button">ON</span>
  </div>
  <br/>
  <br/>
  <br/>
  <br/>
  <h1 id="intro-title" style="margin-top: -60px"></h1>
  <pre id="intro"></pre>

  <h1 id="verse-title"></h1>
  <pre id="verse"></pre>
  
  <h1 id="chorus-title"></h1>
  <pre id="chorus"></pre>

  <script>
    const tabs = {
      halfStepDown: {
        intro: `
(slide 2nd time then wait for drums)
G -/9-`,
        verse: `
------------  ----
-(2)--------  ----
----0---0-2-  -24-
--0------0--  ----

-9-----------------------
----9--7--6--4---2-------
-------------------0-0-2- (all the
----------------------0--  vampires)

-9-----9--------------
----9-----9---2-------
----------------0-0-2-
-------------------0-- (wanna glide)`,
        chorus: `
A -------------  ---7-
E -0-/5--5\\0/7-  -9--

(Keep going after 2nd chorus singing)
(Cut out 2x on chunky gtr 3rd chorus)`,
        introTitle: "Intro",
        verseTitle: "Prechorus VI (Bb-G#-F#)",
        chorusTitle: "Chorus VI (C#-F#-Bb-G#)"
      },
      standardTuning: {
        intro: `
(slide 2nd time then wait for drums)
G -/10-`,
        verse: `
------------  ----
-(3)--------  ----
----1---1-3-  -35-
--1------1--  ----

-10----------------------
-----10--8--7--5--3------
-------------------1-1-3- (all the
----------------------1--  vampires)

-10-----10-------------
-----10-----10--3------
-----------------1-1-3-
--------------------1-- (wanna glide)`,
        chorus: `
A -------------  ---8-
E -1-/6--6\\1/8-  -10--

(Keep going after 2nd chorus singing)
(Cut out 2x on chunky gtr 3rd chorus)`,
        introTitle: "Intro",
        verseTitle: "Verse I (F-Bb-F-C)",
        chorusTitle: "Chorus I (F-Bb-F-C)"
      }
    };

    // Set initial tab content
    const initialTabs = tabs.halfStepDown;
    document.getElementById('intro').textContent = initialTabs.intro.trim() + '\n\n';
    document.getElementById('verse').textContent = initialTabs.verse.trim() + '\n\n';
    document.getElementById('chorus').textContent = initialTabs.chorus.trim() + '\n\n';
    document.getElementById('intro-title').textContent = initialTabs.introTitle.trim() + '\n\n';
    document.getElementById('verse-title').textContent = initialTabs.verseTitle.trim() + '\n\n';
    document.getElementById('chorus-title').textContent = initialTabs.chorusTitle.trim() + '\n\n';

    document.getElementById('toggle-button').addEventListener('click', function() {
      var isHalfStepDown = this.textContent === 'ON';
      this.textContent = isHalfStepDown ? 'OFF' : 'ON';
      const selectedTabs = isHalfStepDown ? tabs.standardTuning : tabs.halfStepDown;

      // Update each section's tab and titles based on capo status
      document.getElementById('intro').textContent = selectedTabs.intro.trim() + '\n\n';
      document.getElementById('verse').textContent = selectedTabs.verse.trim() + '\n\n';
      document.getElementById('chorus').textContent = selectedTabs.chorus.trim() + '\n\n';

      // Update the titles
      document.getElementById('intro-title').textContent = selectedTabs.introTitle.trim() + '\n\n';
      document.getElementById('verse-title').textContent = selectedTabs.verseTitle.trim() + '\n\n';
      document.getElementById('chorus-title').textContent = selectedTabs.chorusTitle.trim() + '\n\n';
    });
  </script>
